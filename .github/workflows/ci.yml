name: CI

on:
  push:
    branches: [main]
    paths:
      - "flowctl/**"
      - "scripts/**"
      - "skills/**/*.md"
      - "agents/**/*.md"
      - ".github/workflows/ci.yml"
      - ".markdownlint.json"
  pull_request:
    branches: [main]
    paths:
      - "flowctl/**"
      - "scripts/**"
      - "skills/**/*.md"
      - "agents/**/*.md"
      - ".github/workflows/ci.yml"
      - ".markdownlint.json"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flowctl
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            flowctl/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('flowctl/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --all-targets

      - name: Run tests
        run: cargo test --all-targets

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  smoke-test:
    name: Shell Smoke Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            flowctl/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('flowctl/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build flowctl
        run: cd flowctl && cargo build --release

      - name: Run smoke tests
        run: bash scripts/smoke_test.sh

  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        working-directory: flowctl
        run: cargo audit

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Lint skill and agent markdown
        run: markdownlint-cli2 "skills/**/*.md" "agents/**/*.md"

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [test]
    defaults:
      run:
        working-directory: flowctl
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain with llvm-tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            flowctl/target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('flowctl/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cov-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --all --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: flowctl/lcov.info
          retention-days: 30
