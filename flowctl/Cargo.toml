[workspace]
resolver = "2"
members = [
    "crates/flowctl-core",
    "crates/flowctl-db",
    "crates/flowctl-scheduler",
    "crates/flowctl-cli",
    "crates/flowctl-daemon",
    "crates/flowctl-tui",
    "crates/flowctl-web",
]

# ── Shared package metadata (nushell convention) ──────────────────────
[workspace.package]
edition = "2021"
rust-version = "1.80"
license = "MIT"
repository = "https://github.com/anthropics/flow-code"

# ── Shared dependencies (nushell convention) ──────────────────────────
# Define all deps once here; crates reference via `dep.workspace = true`
[workspace.dependencies]
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
thiserror = "2"
anyhow = "1"

# Time
chrono = { version = "0.4", features = ["serde"] }

# Regex
regex = "1"

# Hashing
sha2 = "0.10"

# Logging
tracing = "0.1"

# DAG (scheduler + TUI)
petgraph = "0.7"

# SQLite (db crate)
rusqlite = { version = "0.32", features = ["bundled"] }
rusqlite_migration = { version = "1.3", features = ["from-directory"] }
include_dir = "0.7"

# CLI (cli crate)
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
miette = { version = "7", features = ["fancy"] }

# TUI (tui crate)
ratatui = "0.29"
crossterm = "0.28"
nucleo = "0.5"

# Async runtime (daemon + scheduler)
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }

# HTTP (daemon)
axum = { version = "0.8", features = ["ws"] }

# File watching (daemon)
notify = "7"

# Unix process management
nix = { version = "0.30", features = ["signal", "process"] }

# Path lookup
which = "8"

# Testing
trycmd = "0.15"

# Internal crate references
flowctl-core = { path = "crates/flowctl-core" }
flowctl-db = { path = "crates/flowctl-db" }
flowctl-scheduler = { path = "crates/flowctl-scheduler" }

# ── Release profile (size-optimized) ─────────────────────────────────
[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true

# ── WASM release profile ─────────────────────────────────────────────
[profile.wasm-release]
inherits = "release"
opt-level = "z"
lto = "fat"
codegen-units = 1

# ── Leptos web frontend configuration ────────────────────────────────
[[workspace.metadata.leptos]]
name = "flowctl-web"
bin-package = "flowctl-cli"
lib-package = "flowctl-web"
site-root = "target/site"
site-pkg-dir = "pkg"
style-file = "crates/flowctl-web/style/main.css"
assets-dir = "crates/flowctl-web/public"
site-addr = "127.0.0.1:17319"
reload-port = 17320
bin-features = ["daemon"]
lib-features = ["hydrate"]
lib-profile-release = "wasm-release"
