schema_version = 1

[filters.dag]
description = "Compact flowctl dag ASCII output — strip box-drawing noise, keep node labels"
match_command = "^flowctl\\s+dag"
strip_lines_matching = [
  "^\\s*$",
  # Box top/bottom lines: "┌───┐" or "└───┘" with optional indent and connector
  "^\\s*(?:└──\\s+)?┌─+┐\\s*$",
  "^\\s*└─+┘\\s*$",
  # Arrow lines between layers: just "│" or "↓"
  "^\\s*[│↓]\\s*$",
]
replace = [
  # Box content line: "    │ .1 [done] │" → ".1 [done]"
  { pattern = "^\\s*│\\s+(\\.[0-9]+\\s+\\[[^\\]]+\\])\\s+│\\s*$", replacement = "$1" },
  # "DAG for fn-19-migrate-flowctl-to-libsql-async-native" → "DAG:fn-19"
  { pattern = "^DAG for (fn-\\d+)[^\\s]*\\s*$", replacement = "DAG:$1" },
]
max_lines = 80

[[tests.dag]]
name = "simple linear dag"
input = """
DAG for fn-5-daemon-scheduler

┌───────────┐
│ .1 [done] │
└───────────┘
  │
  ↓
  └── ┌───────────┐
      │ .2 [done] │
      └───────────┘
"""
expected = """
DAG:fn-5
.1 [done]
.2 [done]
"""

[[tests.dag]]
name = "with wip status"
input = """
DAG for fn-19

┌───────────┐
│ .1 [ >> ] │
└───────────┘
  │
  ↓
  └── ┌───────────┐
      │ .2 [todo] │
      └───────────┘
"""
expected = """
DAG:fn-19
.1 [ >> ]
.2 [todo]
"""

[[tests.dag]]
name = "three-layer dag"
input = """
DAG for fn-21

┌───────────┐
│ .1 [done] │
└───────────┘
  │
  ↓
  └── ┌───────────┐
      │ .2 [done] │
      └───────────┘
    │
    ↓
    └── ┌───────────┐
        │ .3 [todo] │
        └───────────┘
"""
expected = """
DAG:fn-21
.1 [done]
.2 [done]
.3 [todo]
"""
