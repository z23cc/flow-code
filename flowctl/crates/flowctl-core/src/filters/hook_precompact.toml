schema_version = 1

[filters.hook_precompact]
description = "Compact pre-compact hook state injection — shorten epic IDs and status fields"
match_command = "^flowctl\\s+hook\\s+pre-compact"
strip_lines_matching = [
  "^\\s*$",
  "^\\[/?flow-code state\\]\\s*$",
]
replace = [
  # "Epic fn-19-migrate-flowctl-to-libsql-async-native: done=1 in_progress=2 todo=3 blocked=4"
  # → "fn-19[1d 2w 3t 4b]"  (keys may appear in any order; order is sorted in hook.rs)
  # We handle the four most common permutations progressively — hook sorts alphabetically:
  # blocked, done, in_progress, todo
  { pattern = "^Epic (fn-\\d+)(?:-[a-zA-Z0-9-]+)?:\\s+blocked=(\\d+)\\s+done=(\\d+)\\s+in_progress=(\\d+)\\s+todo=(\\d+)\\s*$", replacement = "${1}[${3}d ${4}w ${5}t ${2}b]" },
  { pattern = "^Epic (fn-\\d+)(?:-[a-zA-Z0-9-]+)?:\\s+done=(\\d+)\\s+in_progress=(\\d+)\\s+todo=(\\d+)\\s*$", replacement = "${1}[${2}d ${3}w ${4}t]" },
  { pattern = "^Epic (fn-\\d+)(?:-[a-zA-Z0-9-]+)?:\\s+done=(\\d+)\\s+in_progress=(\\d+)\\s*$", replacement = "${1}[${2}d ${3}w]" },
  { pattern = "^Epic (fn-\\d+)(?:-[a-zA-Z0-9-]+)?:\\s+done=(\\d+)\\s+todo=(\\d+)\\s*$", replacement = "${1}[${2}d ${3}t]" },
  { pattern = "^Epic (fn-\\d+)(?:-[a-zA-Z0-9-]+)?:\\s+done=(\\d+)\\s*$", replacement = "${1}[${2}d]" },
  { pattern = "^Epic (fn-\\d+)(?:-[a-zA-Z0-9-]+)?:\\s+in_progress=(\\d+)\\s+todo=(\\d+)\\s*$", replacement = "${1}[${2}w ${3}t]" },
  { pattern = "^Epic (fn-\\d+)(?:-[a-zA-Z0-9-]+)?:\\s+todo=(\\d+)\\s*$", replacement = "${1}[${2}t]" },
  # "  IN_PROGRESS: fn-19-slug.1 "Title" files=[a,b,c]" → "  wip:.1 \"Title\" [a,b,c]"
  { pattern = "^  IN_PROGRESS:\\s+fn-\\d+(?:-[a-zA-Z0-9-]+)?(\\.\\d+)\\s+(\".+?\")(?:\\s+files=\\[([^\\]]*)\\])?\\s*$", replacement = "  wip:$1 $2 [$3]" },
  # "File locks (2 active):" → "locks(2):"
  { pattern = "^File locks \\((\\d+) active\\):\\s*$", replacement = "locks($1):" },
  # "  src/foo.rs -> fn-12-slug.3" → "  src/foo.rs→.3"
  { pattern = "^  (\\S+)\\s+->\\s+fn-\\d+(?:-[a-zA-Z0-9-]+)?(\\.\\d+)\\s*$", replacement = "  $1→$2" },
  # "Ready: fn-19-slug.1, fn-19-slug.2" → "R:.1,.2"
  { pattern = "^Ready:\\s+(.+)$", replacement = "R:$1" },
  # Strip epic prefixes from ready list (re-applied): "fn-19-slug.1" → ".1"
  { pattern = "\\bfn-\\d+(?:-[a-zA-Z0-9-]+)?(\\.\\d+)", replacement = "$1" },
]
max_lines = 40

[[tests.hook_precompact]]
name = "basic epic list"
input = """[flow-code state]
Epic fn-15-react-vite: done=8
Epic fn-19-migrate-libsql: done=1 in_progress=1 todo=5
[/flow-code state]"""
expected = """fn-15[8d]
fn-19[1d 1w 5t]"""

[[tests.hook_precompact]]
name = "with in_progress task and locks"
input = """[flow-code state]
Epic fn-19-migrate: done=1 in_progress=1 todo=5
  IN_PROGRESS: fn-19-migrate.1 "Setup DB" files=[a.rs,b.rs]
File locks (2 active):
  src/foo.rs -> fn-12-slug.3
  src/bar.rs -> fn-19-migrate.1
Ready: fn-19-migrate.2, fn-19-migrate.3
[/flow-code state]"""
expected = """fn-19[1d 1w 5t]
  wip:.1 \"Setup DB\" [a.rs,b.rs]
locks(2):
  src/foo.rs→.3
  src/bar.rs→.1
R:.2, .3"""

[[tests.hook_precompact]]
name = "all status keys"
input = """[flow-code state]
Epic fn-5-daemon: blocked=1 done=3 in_progress=0 todo=2
[/flow-code state]"""
expected = """fn-5[3d 0w 2t 1b]"""

[[tests.hook_precompact]]
name = "empty state preserved"
input = ""
expected = ""
