schema_version = 1

[filters.tasks]
description = "Compact flowctl tasks output — strip epic prefix, shorten status, drop deps slug repetition"
match_command = "^flowctl\\s+tasks"
strip_lines_matching = [
  "^Tasks( for [^(]+)? \\(\\d+\\):",
  "^\\s*$",
]
replace = [
  # Compact the "deps:" list — strip epic prefix from each dep
  # "(deps: fn-12-token-compact-rtk-guard.1, fn-12-token-compact-rtk-guard.8)"
  # → "(deps: .1, .8)"
  { pattern = "\\bfn-\\d+(?:-[a-zA-Z0-9-]+)?(\\.\\d+)", replacement = "$1" },
  # Convert status tag to short form: [in_progress]→[wip], [skipped]→[skip], [blocked]→[blk]
  # Preserve leading whitespace with a capture group.
  { pattern = "^(\\s*)\\[in_progress\\]", replacement = "${1}[wip]" },
  { pattern = "^(\\s*)\\[skipped\\]", replacement = "${1}[skip]" },
  { pattern = "^(\\s*)\\[blocked\\]", replacement = "${1}[blk]" },
]
truncate_lines_at = 60
max_lines = 80

[[tests.tasks]]
name = "basic compaction with deps"
input = """
Tasks for fn-12-token-compact-rtk-guard (2):

  [skipped] fn-12-token-compact-rtk-guard.8: T2: List commands compact [backend] (deps: fn-12-token-compact-rtk-guard.1)
  [in_progress] fn-12-token-compact-rtk-guard.16: T0: Port rtk filter engine [backend]
"""
expected = """
  [skip] .8: T2: List commands compact [backend] (deps: .1)
  [wip] .16: T0: Port rtk filter engine [backend]
"""

[[tests.tasks]]
name = "multiple deps compacted"
input = """
Tasks for fn-12-token-compact-rtk-guard (1):

  [skipped] fn-12-token-compact-rtk-guard.10: T5 [backend] (deps: fn-12-token-compact-rtk-guard.2, fn-12-token-compact-rtk-guard.1, fn-12-token-compact-rtk-guard.8)
"""
expected = """
  [skip] .10: T5 [backend] (deps: .2, .1, .8)
"""

[[tests.tasks]]
name = "todo and done unchanged"
input = """
Tasks for fn-5 (2):

  [todo] fn-5.1: setup [backend]
  [done] fn-5.2: wire it up [backend]
"""
expected = """
  [todo] .1: setup [backend]
  [done] .2: wire it up [backend]
"""
